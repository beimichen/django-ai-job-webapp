{% extends "base4.html" %}
{% load static %}

{% block title %}User: {{ object.username }}{% endblock %}

{% block content %}
<style>
    .btn-info {
        background-color: #FA5765;
    }
</style>
<div class="container">

  <div class="row">
    <div class="col-sm-12" style="margin-top:40px;">

      <h2>{{ object.username | capfirst }}</h2>
      {% if object.name %}
        <p>{{ object.name }}</p>
      {% endif %}
    </div>
  </div>

{% if object == request.user %}
<!-- Action buttons -->
<div class="row">

  <div class="col-sm-12" style="margin-top:20px;">
    <a class="btn btn-info fillHeight flex-btn-margin right-btn" href="{% url 'users:update' %}" role="button">My Info</a>
    <a class="btn btn-info fillHeight flex-btn-margin right-btn" href="{% url 'account_email' %}" role="button">E-Mail</a>
    <!-- Your Stuff: Custom user template urls -->
  </div>

</div>
<!-- End Action buttons -->
{% endif %}


</div>
{% endblock content %}
